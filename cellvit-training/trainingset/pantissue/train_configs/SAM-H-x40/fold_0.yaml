logging:
  mode: offline
  project: cellvit-pantissue
  notes: pantissue-pantissue-12class-SAM-H-x40
  log_comment: pantissue-pantissue-sam-h-x40
  wandb_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  log_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  level: Debug

random_seed: 42
gpu: 0

data:
  dataset: DetectionDataset
  dataset_path: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue
  normalize_stains_train: false
  normalize_stains_val: false
  num_classes: 12
  train_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/train.csv
  val_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/val.csv
  label_map:
    0: lymphoid
    1: other_stromal_mesenchymal
    2: epithelial
    3: tumor
    4: myeloid
    5: endothelial
    6: neural
    7: plasma
    8: other_granulocyte
    9: fibroblast
    10: neutrophil
    11: mast

# Albumentations transforms applied by cellvit/training/experiments/
# experiment_cell_classifier.py::get_transforms(). Each entry has a single
# `p` (probability of applying the op per sample, per epoch). Random
# RandomRotate90 + flips are the standard pathology-safe augmentations for
# H&E classification heads. `normalize` is mandatory once this block is
# present (otherwise get_transforms() does NOT fall back to defaults).
transformations:
  randomrotate90:
    p: 0.5
  horizontalflip:
    p: 0.5
  verticalflip:
    p: 0.5
  normalize:
    mean: [0.5, 0.5, 0.5]
    std:  [0.5, 0.5, 0.5]

cellvit_path: ${CELLVIT_TRAINING_ROOT}/cellvit/models/CellViT-SAM-H-x40.pth

model:
  hidden_dim: 256

training:
  cache_cell_dataset: true
  batch_size: 64
  epochs: 50
  drop_rate: 0.1
  optimizer: AdamW
  optimizer_hyperparameter:
    betas:
      - 0.85
      - 0.9
    lr: 0.0003
    weight_decay: 0.00002
  early_stopping_patience: 20
  mixed_precision: true
  eval_every: 1
  weighted_sampling: true
  # Inverse-frequency weights (weight = min(10 / class_percent, 10.0)).
  # class  0  lymphoid                    28.87%  ->  weight  0.35
  # class  1  other_stromal_mesenchymal    6.08%  ->  weight  1.65
  # class  2  epithelial                  13.31%  ->  weight  0.75
  # class  3  tumor                       12.73%  ->  weight  0.79
  # class  4  myeloid                      8.04%  ->  weight  1.24
  # class  5  endothelial                  4.29%  ->  weight  2.33
  # class  6  neural                      11.59%  ->  weight  0.86
  # class  7  plasma                       2.44%  ->  weight  4.10
  # class  8  other_granulocyte            0.13%  ->  weight 10.00  (capped)
  # class  9  fibroblast                  11.31%  ->  weight  0.88
  # class 10  neutrophil                   0.11%  ->  weight 10.00  (capped)
  # class 11  mast                         1.11%  ->  weight  9.02
  weight_list: [0.35, 1.65, 0.75, 0.79, 1.24, 2.33, 0.86, 4.1, 10, 0.88, 10, 9.02]
  scheduler:
    scheduler_type: exponential
    gamma: 0.95
