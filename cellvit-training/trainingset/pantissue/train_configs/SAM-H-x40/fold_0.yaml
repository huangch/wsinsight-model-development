logging:
  mode: offline
  project: cellvit-pan-tissue
  notes: pantissue-pantissue-label-10class-SAM-H-x40-40samples
  log_comment: pantissue-pantissue-sam-h-x40
  wandb_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  log_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  level: Debug

random_seed: 42
gpu: 0

data:
  dataset: DetectionDataset
  dataset_path: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue
  normalize_stains_train: false
  normalize_stains_val: false
  num_classes: 10
  train_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/train.csv
  val_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/val.csv
  label_map:
    0: lymphoid
    1: stromal
    2: epithelial
    3: tumor
    4: myeloid
    5: endothelial
    6: neural
    7: plasma
    8: granulocyte
    9: blast

cellvit_path: ${CELLVIT_TRAINING_ROOT}/cellvit/models/CellViT-SAM-H-x40.pth

model:
  hidden_dim: 256

training:
  cache_cell_dataset: true
  batch_size: 64
  epochs: 50
  drop_rate: 0.1
  optimizer: AdamW
  optimizer_hyperparameter:
    betas:
      - 0.85
      - 0.9
    lr: 0.0003
    weight_decay: 0.00002
  early_stopping_patience: 20
  mixed_precision: true
  eval_every: 1
  weighted_sampling: true
  # Inverse-frequency weights (weight ≈ 10 / class_percent, capped at 10.0).
  # Percentages are pooled cell counts across all 40 H&E samples
  # (total 14,841,455 cells), computed by build_cell_labels.py.
  # class 0  lymphoid    23.67%  -> weight ~0.42
  # class 1  stromal     20.99%  -> weight ~0.48
  # class 2  epithelial  17.40%  -> weight ~0.57
  # class 3  tumor       15.79%  -> weight ~0.63
  # class 4  myeloid      9.33%  -> weight ~1.07
  # class 5  endothelial  4.70%  -> weight ~2.13
  # class 6  neural       4.32%  -> weight ~2.31
  # class 7  plasma       1.99%  -> weight ~5.03
  # class 8  granulocyte  1.19%  -> weight ~8.40
  # class 9  blast        0.63%  -> weight ~10.00  (capped)
  weight_list: [0.42, 0.48, 0.57, 0.63, 1.07, 2.13, 2.31, 5.03, 8.40, 10.00]
  scheduler:
    scheduler_type: exponential
    gamma: 0.95
