# data/xenium/skin/SOURCES.yaml
# Per-sample manifest for skin Xenium data.
#
# This is a stub manifest enumerating the publicly-available 10x
# Xenium samples present on disk. The training pipeline for this
# tissue is NOT yet configured (no cellvit-training/tissue_configs/skin.yaml
# exists). To enable training, author that YAML using the same
# `samples:` list below as the source of truth.
#
# Each entry:
#   - dataset_name : human-readable 10x dataset/sample folder name.
#   - he_image     : H&E .ome.tif filename (without extension), placed
#                    one level above its outs/ folder.
#   - relative_outs: path of the outs/ folder relative to data/xenium/skin/.
#                    May not yet exist on disk for samples that have
#                    only the H&E image and no outs/ bundle.
#
# Source: 10x Genomics — Xenium Datasets
#         https://www.10xgenomics.com/datasets?menu%5Bproducts.name%5D=Xenium
# License: 10x Genomics License (non-commercial research)

samples:
  - dataset_name:  "Human Skin Data with Xenium Human Multi-Tissue and Cancer Panel/Sample 1"
    he_image:      "Xenium_V1_hSkin_nondiseased_section_1_FFPE_he_image"
    relative_outs: "Human Skin Data with Xenium Human Multi-Tissue and Cancer Panel/Sample 1/outs"

  - dataset_name:  "Human Skin Data with Xenium Human Multi-Tissue and Cancer Panel/Sample 2"
    he_image:      "Xenium_V1_hSkin_nondiseased_section_2_FFPE_he_image"
    relative_outs: "Human Skin Data with Xenium Human Multi-Tissue and Cancer Panel/Sample 2/outs"

  - dataset_name:  "Human Skin Preview Data (Xenium Human Skin Gene Expression Panel with Custom Add-On)"
    he_image:      "Xeniumranger_V1_hSkin_Melanoma_Add_on_FFPE_he_image"
    relative_outs: "Human Skin Preview Data (Xenium Human Skin Gene Expression Panel with Custom Add-On)/outs"

  - dataset_name:  "Human Skin Preview Data (Xenium Human Skin Gene Expression Panel)"
    he_image:      "Xenium_V1_hSkin_Melanoma_Base_FFPE_he_image"
    relative_outs: "Human Skin Preview Data (Xenium Human Skin Gene Expression Panel)/outs"

  - dataset_name:  "Preview Data: FFPE Human Skin Primary Dermal Melanoma with 5K Human Pan Tissue and Pathways Panel"
    he_image:      "Xenium_Prime_Human_Skin_FFPE_he_image"
    relative_outs: "Preview Data: FFPE Human Skin Primary Dermal Melanoma with 5K Human Pan Tissue and Pathways Panel/outs"
