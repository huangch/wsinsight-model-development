logging:
  mode: offline
  project: cellvit-pantissue
  notes: pantissue-pantissue-12class-SAM-H-x40
  log_comment: pantissue-pantissue-sam-h-x40
  wandb_dir: /workspace/wsinsight/wsinsight-model-development/cellvit-training/cellvit/CellViT-plus-plus/logs_local
  log_dir: /workspace/wsinsight/wsinsight-model-development/cellvit-training/cellvit/CellViT-plus-plus/logs_local/2026-05-22T125957_pantissue-pantissue-sam-h-x40
  level: Debug
  run_id: lswccgmi
  wandb_file: lswccgmi
random_seed: 42
gpu: 0
data:
  dataset: DetectionDataset
  dataset_path: /workspace/wsinsight/wsinsight-model-development/cellvit-training/trainingset/pantissue
  normalize_stains_train: false
  normalize_stains_val: false
  num_classes: 12
  train_filelist: /workspace/wsinsight/wsinsight-model-development/cellvit-training/trainingset/pantissue/splits/fold_0/train.csv
  val_filelist: /workspace/wsinsight/wsinsight-model-development/cellvit-training/trainingset/pantissue/splits/fold_0/val.csv
  label_map:
    0: lymphoid
    1: other_stromal_mesenchymal
    2: epithelial
    3: tumor
    4: myeloid
    5: endothelial
    6: neural
    7: plasma
    8: other_granulocyte
    9: fibroblast
    10: neutrophil
    11: mast
cellvit_path: /workspace/wsinsight/wsinsight-model-development/cellvit-training/cellvit/models/CellViT-SAM-H-x40.pth
model:
  hidden_dim: 256
training:
  cache_cell_dataset: true
  batch_size: 64
  epochs: 50
  drop_rate: 0.1
  optimizer: AdamW
  optimizer_hyperparameter:
    betas:
    - 0.85
    - 0.9
    lr: 2.5e-5
    weight_decay: 2.0e-05
  early_stopping_patience: 20
  mixed_precision: true
  eval_every: 1
  weighted_sampling: true
  # Inverse-frequency weights, rescaled so sum(weight) == 12 (mean weight 1.0); per-class cap before rescale = 10.0.
  # class  0  lymphoid                    26.85%  ->  weight 0.101
  # class  1  other_stromal_mesenchymal    5.19%  ->  weight 0.524
  # class  2  epithelial                  15.61%  ->  weight 0.174
  # class  3  tumor                       16.84%  ->  weight 0.161
  # class  4  myeloid                      9.11%  ->  weight 0.299
  # class  5  endothelial                  4.68%  ->  weight 0.581
  # class  6  neural                       4.30%  ->  weight 0.633
  # class  7  plasma                       2.31%  ->  weight 1.175
  # class  8  other_granulocyte            0.19%  ->  weight 2.719  (capped pre-rescale)
  # class  9  fibroblast                  14.06%  ->  weight 0.193
  # class 10  neutrophil                   0.12%  ->  weight 2.719  (capped pre-rescale)
  # class 11  mast                         0.73%  ->  weight 2.719  (capped pre-rescale)
  # (sum of weights = 11.998, target = 12)
  weight_list: [0.101, 0.524, 0.174, 0.161, 0.299, 0.581, 0.633, 1.175, 2.719, 0.193, 2.719, 2.719]
  scheduler:
    scheduler_type: exponential
    gamma: 0.95
run_sweep: false
agent: null
just_load_model: false
