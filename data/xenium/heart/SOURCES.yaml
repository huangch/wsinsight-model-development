# data/xenium/heart/SOURCES.yaml
# Per-sample manifest for heart Xenium data.
#
# This is a stub manifest enumerating the publicly-available 10x
# Xenium samples present on disk. The training pipeline for this
# tissue is NOT yet configured (no cellvit-training/tissue_configs/heart.yaml
# exists). To enable training, author that YAML using the same
# `samples:` list below as the source of truth.
#
# Each entry:
#   - dataset_name : human-readable 10x dataset/sample folder name.
#   - he_image     : H&E .ome.tif filename (without extension), placed
#                    one level above its outs/ folder.
#   - relative_outs: path of the outs/ folder relative to data/xenium/heart/.
#                    May not yet exist on disk for samples that have
#                    only the H&E image and no outs/ bundle.
#
# Source: 10x Genomics — Xenium Datasets
#         https://www.10xgenomics.com/datasets?menu%5Bproducts.name%5D=Xenium
# License: 10x Genomics License (non-commercial research)

samples:
  - dataset_name:  "Human Heart Data with Xenium Human Multi-Tissue and Cancer Panel"
    he_image:      "Xenium_V1_hHeart_nondiseased_section_FFPE_he_image"
    relative_outs: "Human Heart Data with Xenium Human Multi-Tissue and Cancer Panel/outs"
