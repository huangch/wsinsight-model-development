# data/xenium/pancreas/SOURCES.yaml
# Per-sample manifest for pancreas Xenium data.
#
# This is a stub manifest enumerating the publicly-available 10x
# Xenium samples present on disk. The training pipeline for this
# tissue is NOT yet configured (no cellvit-training/tissue_configs/pancreas.yaml
# exists). To enable training, author that YAML using the same
# `samples:` list below as the source of truth.
#
# Each entry:
#   - dataset_name : human-readable 10x dataset/sample folder name.
#   - he_image     : H&E .ome.tif filename (without extension), placed
#                    one level above its outs/ folder.
#   - relative_outs: path of the outs/ folder relative to data/xenium/pancreas/.
#                    May not yet exist on disk for samples that have
#                    only the H&E image and no outs/ bundle.
#
# Source: 10x Genomics — Xenium Datasets
#         https://www.10xgenomics.com/datasets?menu%5Bproducts.name%5D=Xenium
# License: 10x Genomics License (non-commercial research)

samples:
  - dataset_name:  "FFPE Human Pancreas with Xenium Multimodal Cell Segmentation"
    he_image:      "Xenium_V1_human_Pancreas_FFPE_he_image"
    relative_outs: "FFPE Human Pancreas with Xenium Multimodal Cell Segmentation/outs"

  - dataset_name:  "FFPE Human Pancreatic Ductal Adenocarcinoma Data with Human Immuno-Oncology Profiling Panel"
    he_image:      "Xenium_V1_Human_Ductal_Adenocarcinoma_FFPE_he_image"
    relative_outs: "FFPE Human Pancreatic Ductal Adenocarcinoma Data with Human Immuno-Oncology Profiling Panel/outs"

  - dataset_name:  "Pancreatic Cancer with Xenium Human Multi-Tissue and Cancer Panel"
    he_image:      "Xenium_V1_hPancreas_Cancer_Add_on_FFPE_he_image"
    relative_outs: "Pancreatic Cancer with Xenium Human Multi-Tissue and Cancer Panel/outs"
