# data/xenium/bone/SOURCES.yaml
# Per-sample manifest for bone Xenium data.
#
# This is a stub manifest enumerating the publicly-available 10x
# Xenium samples present on disk. The training pipeline for this
# tissue is NOT yet configured (no cellvit-training/tissue_configs/bone.yaml
# exists). To enable training, author that YAML using the same
# `samples:` list below as the source of truth.
#
# Each entry:
#   - dataset_name : human-readable 10x dataset/sample folder name.
#   - he_image     : H&E .ome.tif filename (without extension), placed
#                    one level above its outs/ folder.
#   - relative_outs: path of the outs/ folder relative to data/xenium/bone/.
#                    May not yet exist on disk for samples that have
#                    only the H&E image and no outs/ bundle.
#
# Source: 10x Genomics — Xenium Datasets
#         https://www.10xgenomics.com/datasets?menu%5Bproducts.name%5D=Xenium
# License: 10x Genomics License (non-commercial research)

samples:
  - dataset_name:  "Human Bone and Bone Marrow Data with Custom Add-on Panel/Acute Lymphoid Leukemia Bone Marrow"
    he_image:      "Xenium_V1_hBoneMarrow_acute_lymphoid_leukemia_section_he_image"
    relative_outs: "Human Bone and Bone Marrow Data with Custom Add-on Panel/Acute Lymphoid Leukemia Bone Marrow/outs"

  - dataset_name:  "Human Bone and Bone Marrow Data with Custom Add-on Panel/Non-diseased Bone Marrow"
    he_image:      "Xenium_V1_hBoneMarrow_nondiseased_section_he_image"
    relative_outs: "Human Bone and Bone Marrow Data with Custom Add-on Panel/Non-diseased Bone Marrow/outs"

  - dataset_name:  "Human Bone and Bone Marrow Data with Custom Add-on Panel/Non-diseased Femur Bone"
    he_image:      "Xenium_V1_hBone_nondiseased_section_he_image"
    relative_outs: "Human Bone and Bone Marrow Data with Custom Add-on Panel/Non-diseased Femur Bone/outs"
