# Breast Xenium sample inventory + H&E label mapping.
#
# Consumed by build_cell_labels.py (--tissue breast).
# HNE_LABEL_TO_INT values are the training class_int; order is significant.

xenium_base: ${PROJECT_ROOT}/data/xenium/breast
out_dir:     ${PROJECT_ROOT}/cellvit-training/trainingset/breast

label_map:
  lymphocyte:           0
  malignant_epithelial: 1
  epithelial:           2
  plasma_cell:          3
  macrophage_like:      4
  fibroblast_like:      5
  pericyte:             6
  endothelial:          7
  basophil:             8
  adipocyte:            9
  mast_cell:           10

# [he_image_stem, relative path from xenium_base to outs/ folder]
# he_image_stem = H&E .ome.tif filename with extension stripped
samples:
  - ["Xenium_Prime_Breast_Cancer_FFPE_he_image",
     "FFPE Human Breast Cancer with 5K Human Pan Tissue and Pathways Panel plus 100 Custom Genes/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_IDC_Big_1_he_unaligned_image",
     "FFPE Human Breast using the Entire Sample Area/Replicate 1/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_IDC_Big_2_he_unaligned_image",
     "FFPE Human Breast using the Entire Sample Area/Replicate 2/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_IDC_With_Addon_he_unaligned_image",
     "FFPE Human Breast with Custom Add-on Panel/Tissue sample 1/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_ILC_With_Addon_he_unaligned_image",
     "FFPE Human Breast with Custom Add-on Panel/Tissue sample 2/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_IDC_he_image",
     "FFPE Human Breast with Pre-designed Panel/Tissue sample 1/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_ILC_he_image",
     "FFPE Human Breast with Pre-designed Panel/Tissue sample 2/outs"]
  - ["Xenium_V1_FFPE_Human_Breast_IDC_With_Addon_he_image",
     "Xenium FFPE Human Breast with Custom Add-on Panel/Tissue sample 1 (IDC)/outs"]
