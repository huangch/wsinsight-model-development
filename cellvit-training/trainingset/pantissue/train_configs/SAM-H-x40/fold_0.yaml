logging:
  mode: offline
  project: cellvit-pan-tissue
  notes: pantissue-pantissue-label-12class-SAM-H-x40-40samples
  log_comment: pantissue-pantissue-sam-h-x40
  wandb_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  log_dir: ${CELLVIT_TRAINING_ROOT}/cellvit/CellViT-plus-plus/logs_local
  level: Debug

random_seed: 42
gpu: 0

data:
  dataset: DetectionDataset
  dataset_path: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue
  normalize_stains_train: false
  normalize_stains_val: false
  num_classes: 12
  train_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/train.csv
  val_filelist: ${CELLVIT_TRAINING_ROOT}/trainingset/pantissue/splits/fold_0/val.csv
  label_map:
    0: lymphoid
    1: other_stromal_mesenchymal
    2: epithelial
    3: tumor
    4: myeloid
    5: endothelial
    6: neural
    7: plasma
    8: other_granulocyte
    9: fibroblast
    10: neutrophil
    11: mast

cellvit_path: ${CELLVIT_TRAINING_ROOT}/cellvit/models/CellViT-SAM-H-x40.pth

model:
  hidden_dim: 256

training:
  cache_cell_dataset: true
  batch_size: 64
  epochs: 50
  drop_rate: 0.1
  optimizer: AdamW
  optimizer_hyperparameter:
    betas:
      - 0.85
      - 0.9
    lr: 0.0003
    weight_decay: 0.00002
  early_stopping_patience: 20
  mixed_precision: true
  eval_every: 1
  weighted_sampling: true
  # Inverse-frequency weights (weight = min(10 / class_percent, 10.0)).
  # 12-class taxonomy after Path 3 (blast → lymphoid/myeloid/plasma split via
  # kurtorank subtype re-mapping). Pooled across 40 H&E samples, total
  # 8,302,437 detections from load_mapping pass 3.
  # class  0  lymphoid                   31.60%  -> weight  0.32
  # class  1  other_stromal_mesenchymal   5.13%  -> weight  1.95
  # class  2  epithelial                 12.93%  -> weight  0.77
  # class  3  tumor                      15.64%  -> weight  0.64
  # class  4  myeloid                     9.08%  -> weight  1.10
  # class  5  endothelial                 5.06%  -> weight  1.98
  # class  6  neural                      5.33%  -> weight  1.88
  # class  7  plasma                      2.59%  -> weight  3.86
  # class  8  other_granulocyte           0.18%  -> weight 10.00  (capped)
  # class  9  fibroblast                 11.52%  -> weight  0.87
  # class 10  neutrophil                  0.15%  -> weight 10.00  (capped)
  # class 11  mast                        0.72%  -> weight 10.00  (capped)
  weight_list: [0.32, 1.95, 0.77, 0.64, 1.10, 1.98, 1.88, 3.86, 10.00, 0.87, 10.00, 10.00]
  scheduler:
    scheduler_type: exponential
    gamma: 0.95
